spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true

  threads:
    virtual:
      enabled: true

scraper:
  base-url: ${SCRAPER_BASE_URL}

ml-service:
  base-url: ${ML_SERVICE_URL}

scheduler:
  internal-token: ${SCHEDULER_INTERNAL_TOKEN}

jwt:
  secret: ${JWT_SECRET}
